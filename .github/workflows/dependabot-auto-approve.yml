name: Dependabot Auto Approve

on:
  workflow_run:
    workflows:
      - CI-pr
      - CI-lint-test
      - CI-CodeQL
      - CI-Restyled
    types:
      - completed

jobs:
  auto-approve:
    if: >-
      github.repository == 'falgon/roki-web' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Evaluate pull request risk
        id: evaluate
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullRequest = context.payload.workflow_run.pull_requests?.[0];

            const skip = (reason) => {
              core.info(reason);
              core.setOutput("should-approve", "false");
              core.setOutput("reason", reason);
            };

            if (!pullRequest) {
              return skip("No pull request is associated with this workflow run.");
            }

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pullRequest.number,
            });

            if (pr.user.login !== "dependabot[bot]") {
              return skip(`PR #${pr.number} is not authored by Dependabot.`);
            }

            if (pr.base.ref !== "develop") {
              return skip(`PR #${pr.number} does not target the develop branch.`);
            }

            if (!pr.labels.some(({ name }) => name === "automerge")) {
              return skip(`PR #${pr.number} does not have the automerge label.`);
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const changedFiles = files.map(({ filename }) => filename).sort();
            const packageFiles = new Set(["package.json", "package-lock.json"]);
            const biomeFiles = new Set(["package.json", "package-lock.json", "biome.json"]);
            const isLockfileOnly =
              changedFiles.length === 1 && changedFiles[0] === "package-lock.json";

            const formatChanges = (changes) =>
              changes.map(({ name, before, after }) => `${name}: ${before} -> ${after}`).join(", ");

            if (isLockfileOnly) {
              core.setOutput("should-approve", "true");
              core.setOutput("pr-url", pr.html_url);
              core.setOutput("reason", "Lockfile-only Dependabot update.");
              return;
            }

            if (!changedFiles.includes("package.json")) {
              return skip(
                `PR #${pr.number} does not update package.json and is not lockfile-only: ${changedFiles.join(
                  ", ",
                )}`,
              );
            }

            const onlyPackageFiles = changedFiles.every((filename) => packageFiles.has(filename));
            const onlyBiomeRelatedFiles = changedFiles.every((filename) => biomeFiles.has(filename));

            if (!onlyPackageFiles && !onlyBiomeRelatedFiles) {
              return skip(
                `PR #${pr.number} changes files outside the dependency manifest allowlist: ${changedFiles.join(
                  ", ",
                )}`,
              );
            }

            const parsePackageManifest = async (ref) => {
              const { data } = await github.rest.repos.getContent({
                owner,
                repo,
                path: "package.json",
                ref,
              });

              if (Array.isArray(data) || !("content" in data)) {
                throw new Error("package.json content lookup returned an unexpected payload.");
              }

              return JSON.parse(Buffer.from(data.content, data.encoding).toString("utf8"));
            };

            const baseManifest = await parsePackageManifest(pr.base.sha);
            const headManifest = await parsePackageManifest(pr.head.sha);

            const stripDependencySections = (manifest) => {
              const {
                dependencies = {},
                devDependencies = {},
                optionalDependencies = {},
                peerDependencies = {},
                ...rest
              } = manifest;
              return rest;
            };

            if (
              JSON.stringify(stripDependencySections(baseManifest)) !==
              JSON.stringify(stripDependencySections(headManifest))
            ) {
              return skip(`PR #${pr.number} updates package.json outside dependency version fields.`);
            }

            const sections = [
              ["dependencies", baseManifest.dependencies ?? {}, headManifest.dependencies ?? {}],
              ["devDependencies", baseManifest.devDependencies ?? {}, headManifest.devDependencies ?? {}],
              ["optionalDependencies", baseManifest.optionalDependencies ?? {}, headManifest.optionalDependencies ?? {}],
              ["peerDependencies", baseManifest.peerDependencies ?? {}, headManifest.peerDependencies ?? {}],
            ];

            const dependencyChanges = sections.flatMap(([section, baseDeps, headDeps]) => {
              const names = [...new Set([...Object.keys(baseDeps), ...Object.keys(headDeps)])].sort();
              return names
                .filter((name) => baseDeps[name] !== headDeps[name])
                .map((name) => ({
                  name,
                  section,
                  before: baseDeps[name] ?? null,
                  after: headDeps[name] ?? null,
                }));
            });

            if (!dependencyChanges.length) {
              return skip(`PR #${pr.number} does not change any dependency versions in package.json.`);
            }

            if (
              dependencyChanges.some(({ before, after }) => before === null || after === null)
            ) {
              return skip(`PR #${pr.number} adds or removes dependencies: ${formatChanges(dependencyChanges)}`);
            }

            if (dependencyChanges.some(({ section }) => section !== "devDependencies")) {
              return skip(
                `PR #${pr.number} updates non-dev dependencies: ${formatChanges(dependencyChanges)}`,
              );
            }

            const allowlistedPatterns = [
              /^@biomejs\/biome$/,
              /^vitest$/,
              /^@vitest\/.+$/,
              /^@types\/.+$/,
            ];

            const isAllowlisted = (dependencyName) =>
              allowlistedPatterns.some((pattern) => pattern.test(dependencyName));

            const nonAllowlisted = dependencyChanges
              .map(({ name }) => name)
              .filter((name) => !isAllowlisted(name));

            if (nonAllowlisted.length > 0) {
              return skip(
                `PR #${pr.number} updates dependencies outside the auto-approve allowlist: ${[
                  ...new Set(nonAllowlisted),
                ].join(", ")}`,
              );
            }

            const normalizeVersion = (version) => version.match(/\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?/)?.[0] ?? null;

            const semverUpdateType = (before, after) => {
              const previous = normalizeVersion(before);
              const next = normalizeVersion(after);

              if (!previous || !next) {
                return "unknown";
              }

              const [previousMajor, previousMinor, previousPatch] = previous
                .split("-")[0]
                .split(".")
                .map(Number);
              const [nextMajor, nextMinor, nextPatch] = next
                .split("-")[0]
                .split(".")
                .map(Number);

              if (
                [previousMajor, previousMinor, previousPatch, nextMajor, nextMinor, nextPatch].some(
                  Number.isNaN,
                )
              ) {
                return "unknown";
              }

              if (nextMajor !== previousMajor) {
                return "major";
              }

              if (nextMinor !== previousMinor) {
                return "minor";
              }

              if (nextPatch !== previousPatch) {
                return "patch";
              }

              return "none";
            };

            const nonPatchChanges = dependencyChanges.filter(
              ({ before, after }) => semverUpdateType(before, after) !== "patch",
            );

            if (nonPatchChanges.length > 0) {
              return skip(
                `PR #${pr.number} is not a pure patch update: ${formatChanges(nonPatchChanges)}`,
              );
            }

            if (!onlyPackageFiles) {
              const biomeOnly =
                onlyBiomeRelatedFiles &&
                dependencyChanges.every(({ name }) => name === "@biomejs/biome");

              if (!biomeOnly) {
                return skip(
                  `PR #${pr.number} changes biome.json for a dependency outside the dedicated allowlist.`,
                );
              }
            }

            core.setOutput("should-approve", "true");
            core.setOutput("pr-url", pr.html_url);
            core.setOutput(
              "reason",
              `Low-risk Dependabot update: ${formatChanges(dependencyChanges)}`,
            );

      - name: Check core CI statuses
        id: checks
        if: steps.evaluate.outputs.should-approve == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.evaluate.outputs.pr-url }}
        run: |
          required_workflows=(
            "CI-pr"
            "CI-lint-test"
            "CI-CodeQL"
            "CI-Restyled"
          )

          pr_json="$(gh pr view "$PR_URL" --json headRefOid)"
          head_sha="$(jq -r '.headRefOid' <<<"$pr_json")"
          runs_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs?event=pull_request&per_page=100")"
          failures=()

          for workflow_name in "${required_workflows[@]}"; do
            conclusion="$(
              jq -r --arg name "$workflow_name" --arg sha "$head_sha" '
                [
                  .workflow_runs[]
                  | select(.name == $name and .head_sha == $sha)
                  | {run_number, conclusion}
                ]
                | sort_by(.run_number)
                | last
                | .conclusion // ""
              ' <<<"$runs_json"
            )"

            if [[ "$conclusion" != "success" ]]; then
              failures+=("${workflow_name}:${conclusion:-missing}")
            fi
          done

          if [[ "${#failures[@]}" -gt 0 ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            printf 'pending_checks=%s\n' "$(IFS=,; echo "${failures[*]}")" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "pending_checks=" >> "$GITHUB_OUTPUT"

      - name: Auto approve low-risk Dependabot PR
        if: steps.evaluate.outputs.should-approve == 'true' && steps.checks.outputs.ready == 'true'
        env:
          PR_URL: ${{ steps.evaluate.outputs.pr-url }}
          REVIEW_BODY: ${{ steps.evaluate.outputs.reason }}
          KIIROTORI_GH_CONFIG_HOSTS: ${{ secrets.KIIROTORI_GH_CONFIG_HOSTS }}
          KIIROTORI_GH_CONFIG_CONFIG: ${{ secrets.KIIROTORI_GH_CONFIG_CONFIG }}
        run: |
          export GH_CONFIG_DIR="$PWD/.config"
          mkdir -p "$GH_CONFIG_DIR"
          printf '%s' "$KIIROTORI_GH_CONFIG_HOSTS" > "$GH_CONFIG_DIR/hosts.yml"
          printf '%s' "$KIIROTORI_GH_CONFIG_CONFIG" > "$GH_CONFIG_DIR/config.yml"

          if [[ "$(gh pr view "$PR_URL" --json reviewDecision --jq '.reviewDecision')" == "APPROVED" ]]; then
            echo "PR is already approved."
            exit 0
          fi

          gh pr review "$PR_URL" --approve --body "$REVIEW_BODY"

      - name: Summarize decision
        if: always()
        run: |
          {
            echo "## Dependabot auto-approve"
            echo
            echo "* Candidate: \`${{ steps.evaluate.outputs.should-approve || 'false' }}\`"
            echo "* Reason: ${{ steps.evaluate.outputs.reason || 'No evaluation result.' }}"
            echo "* Core checks ready: \`${{ steps.checks.outputs.ready || 'false' }}\`"
            if [[ -n "${{ steps.checks.outputs.pending_checks }}" ]]; then
              echo "* Pending or missing checks: \`${{ steps.checks.outputs.pending_checks }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
